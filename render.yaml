services:
  - type: postgres
    name: parkguard-db
    plan: free
    postgresMajorVersion: 15

  - type: web
    name: parkguard-api
    env: node
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    preDeployCommand: node scripts/init_db.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: parkguard-db
          property: connectionString
      - key: NODE_ENV
        value: production
